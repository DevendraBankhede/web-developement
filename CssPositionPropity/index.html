<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
       <header class="navbar">
  <div class="logo">
    <img src="ricr.png" alt="Logo">
  </div>

  <div class="navbar1">
   <div>HOME</div>
   <div>ABOUT</div>
   <div>COURSES</div>
   <div>IDE</div>
   <div>CONTACT US</div>
    </div>

  <div class="navbar2">
    <a href="tel:+918889991736" class="phone-no">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-telephone-fill" viewBox="0 0 16 16">
    <path fill-rule="evenodd" d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"/>

    <button class="login-btn">Student Login</button>
    </div>
</header>

<div class="container">
    <div class="form-card">
        <h1>Enquiry Form</h1>
        <p class="subtitle">Have questions or need assistance? Fill out the form below to connect with our team and explore your opportunities.</p>

        <form>
            <div class="input-row">
                <div class="field">
                    <label>Person Name*</label>
                    <input type="text" placeholder="Person Name">
                </div>
                <div class="field">
                    <label>Contact Number*</label>
                    <input type="text" placeholder="Contact Number">
                </div>
            </div>

            <div class="input-row">
                <div class="field">
                    <label>Email*</label>
                    <input type="email" placeholder="Email">
                </div>
                <div class="field1">
                    <label>Qualification*</label>
                    <input type="text" placeholder="Qualification">
                </div>
            </div>

            <div class="field">
                <label>College/School Name*</label>
                <input type="text" placeholder="College/School Name">
            </div>

            <div class="input-row">
                <div class="field">
                    <label>Year*</label>
                    <select>
                        <option>Year</option>
                    </select>
                </div>
                <div class="field">
                    <label>Branch*</label>
                    <input type="text" placeholder="Branch">
                </div>
            </div>

            
        </form>
        <div class="input-row">
    <div class="field">
        <label>Interested in Which Course*</label>
        <div class="checkbox-group">
            <label class="check-item"><input type="checkbox"> Full Stack Web Development</label>
            <label class="check-item"><input type="checkbox"> Data Science with Python</label>
            <label class="check-item"><input type="checkbox"> Data Analytics with Python</label>
            <label class="check-item"><input type="checkbox"> Business Analyst</label>
            <label class="check-item"><input type="checkbox"> Java Programming</label>
            <label class="check-item"><input type="checkbox"> Python Programming</label>
            <label class="check-item"><input type="checkbox"> C/C++ Programming</label>
            <label class="check-item"><input type="checkbox"> Other</label>
        </div>
    </div>

    <div class="field">
        <label>Source of Information</label>
        <p class="small-text">(Only choose 'Received call from institute' if you actually got a call from us)</p>
        <select>
            <option>Source of Information</option>
        </select>

        <label style="margin-top: 20px;">Name of Executive*</label>
        <select>
            <option>Name of Executive</option>
        </select>
    </div>
</div>
<button type="submit" class="submit-btn">Submit</button>
</body>
</html>
