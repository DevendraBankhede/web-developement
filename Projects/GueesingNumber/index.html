<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number Game</title>
    <link rel="stylesheet" href="style.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  </head>
  <body class="bg-primary">
    <div class=" card  w-25  d-flex justify-content-center align-items-center mx-auto mt-5 bg-success">

    
            <div class="game-box mb-5">
            <h2>Guess The Number</h2>
            <p>Enter a number between 1 to 10</p>

            
            <input
                type="number"
                id="guessInput"
                min="1"
                max="10"
                placeholder="Enter your guess" 
            />
            
                <button onclick="checkGuess()" class="mt-2 ms-5 mb-5">Submit</button>
        
            

            <div id="message"></div>
            </div>

    </div>
    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  </body>
</html>
