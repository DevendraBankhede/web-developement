<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-danger px-5">
      <div class="container d-flex justify-content-between align-items-center">
        <img src="images/1.png" height="60" />
      </div>

      <div class="d-flex gap-3">
        <a href="login.html" class="btn  link-light">Login</a>
        <a href="register.html" class="btn btn-light rounded-2">Register</a>
      </div>
    </nav>
    <div class="container d-flex justify-content-between gap-5 mt-5 p-5 ">
      <div class="code p-4 border border-2 rounded-3 bg-light p-5">
        <div class="text-center">
          <h1>Welcome Back</h1>
          <p>Login to your Cravings account</p>
        </div>
        <div>
          <label>Email</label><br />
          <input type="Email" class="form-control" />
        </div>
        <br />

        <div>
          <label>Password</label>
          <input type="password" class="form-control" />
        </div>
        <br />
        <div>
          <div>
            <input type="checkbox" />
            <span>Remember me</span>
            <a href="" class="m-5 text-decoration-none text-danger">Forget password?</a>
          </div>
          <br />
        </div>
        <div>
          <button class="bg-danger w-100 rounded-1 p-2">Login</button>
        </div>
        <br />
        <div class="d-flex aline-item-center">
          <hr class="flex-grow-1" />
          <span>Don't have an account?</span>
          <hr class="flex-grow-1" />
        </div>
        <p class="text-center">Create an account</p>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
