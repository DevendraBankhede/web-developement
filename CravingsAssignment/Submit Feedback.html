<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Feedback</title>
    <link rel="stylesheet" href="Style.Css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    
    <form>
    <header class="mark">
        <nav class="navbar navbar-expand-lg  px-5 fixed-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="Home.html"><img src="images/1.png" height="60" /></a>
        </div>

        <div class="d-flex gap-3">
            <a href="login.html" class="btn link-light">Login</a>
            <a href="register.html" class="btn bg-white rounded-2">Register</a>
        </div>
    </nav>
    </header>

    <div class="container d-flex justify-content-end align-content-center pt-5 h-100">
        <div class="code p-4 shadow  col-12 col-sm-10 col-md-6 col-lg-4 m-5 pt-2 bg-light">
            <div class="text-center mb-3">
                <h1>Share Feedback</h1>
                <p>Help us improve your Cravings experience.</p>
            </div>

            <div class="mb-3">
                <label>Full name</label><br>
                <input type="text" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
                <label>Email</label><br>
                <input type="text" class="form-control" placeholder="Enter your Email">
            </div>

            <div class="mb-3">
                <label>Feedback Category</label><br>
                <select class="form-control">
                    <option>Food Quality</option>
                    <option>delivery experience</option>
                    <option>App & website</option>
                    <option>Customer Support</option>
                    <option>Praising & value</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Overall Rating</label>
                <i class="bi bi-star fs-3 text-secondary star" data-value="1"></i>
                <i class="bi bi-star fs-3 text-secondary star" data-value="2"></i>
                <i class="bi bi-star fs-3 text-secondary star" data-value="3"></i>
                <i class="bi bi-star fs-3 text-secondary star" data-value="4"></i>
                <i class="bi bi-star fs-3 text-secondary star" data-value="5"></i>
            </div>

            <div class="mb-3">
                <label>Your Feedback</label><br>
                <textarea rows="2" cols="40" class="rounded-2 form-control">tell me about your experience</textarea>
            </div>

            <div class=" d-grid mb-3">
                <button class="btn btn-danger form-control">Submit feedback</button>                
            </div>
        </div>
    </div>
</form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
