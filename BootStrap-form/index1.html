<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class=" bg-primary pt-5 mt-5 ">
    <div id="a1" class="d-flex gap-5 justify-content-center align-items-end mt-5 pt-5">
      <!-- Login form -->
      <div class="border border-1 border-dark rounded-1 p-3 bg-white  d-grid gap-2 w-25 mt-5 pt-5">
        <h2 class="p-3"><u>Lo</u>gin</h2>
        <div>
          <i class="bi bi-envelope"></i>
          <input class="border border-0 border-bottom border-dark m-2"  type="text" placeholder="Enter your email" />
        </div>
        <div>
          <i class="bi bi-lock"></i>
          <input class="border border-0 border-bottom border-dark m-2" type="password" placeholder="Confirm a password" />
          <i class="bi bi-eye"></i>
        </div>
        <div>
          <div >
            <input type="checkbox" >
            <span> Remember me</span>
            <a  href="#" class="m-5">Forget password?</a>
          </div>
        </div>  
        <div class="">
          <button class="w-100 bg-primary "><u>Lo</u>gin Now</button>
        </div>
        <div>
          <p>Don't have an account?<a href="#">  Signup now</a></p>
        </div>
      </div>

      <!-- Registration form -->
      <div class="border border-1 border-dark rounded-1 p-3 bg-white d-grid gap-2 row g-2 justify-content-center mt-4 w-25">
        <h2 class="p-3"><u>Re</u>gistration</h2>
        <div>
          <i class="bi bi-person"></i>
          <input class="border border-0 border-bottom border-dark m-2" type="text" placeholder="Enter your name" />
        </div>
        <div>
          <i class="bi bi-envelope"></i>
          <input class="border border-0 border-bottom border-dark m-2" type="email" placeholder="Enter your email" />
        </div>
        <div>
          <i class="bi bi-lock"></i>
          <input class="border border-0 border-bottom border-dark m-2" type="password" placeholder="Create a password" />
        </div>
        <div>
          <i class="bi bi-lock"></i>
          <input class="border border-0 border-bottom border-dark m-2" type="password" placeholder="Confirm a password" />
          <i class="bi bi-eye"></i>
        </div>
        <div>
          <div>
            <input class="m-2" type="checkbox" /><span
              >I accept all Terms & Conditions</span
            >
          </div>
        </div>
        <div class="">
          <button class="w-100 bg-primary"><u>Re</u>gistration Now</button>
        </div>
        <div>
          <p class="m-2">Alerady have an account?<a href="#">  Login now</a></p>
        </div>
      </div>
    </div>

    <!-- Bootstrap Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
