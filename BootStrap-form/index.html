<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
      <div class="container">
        <a class="navbar-brand" href="">
          <img src="ricr.png" width="150" />
        </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav mx-auto gap-4">
            <li class="nav-item"><a class="nav-link">HOME</a></li>
            <li class="nav-item"><a class="nav-link">ABOUT</a></li>
            <li class="nav-item"><a class="nav-link">COURSES</a></li>
            <li class="nav-item"><a class="nav-link">IDE</a></li>
            <li class="nav-item"><a class="nav-link">CONTACT</a></li>
          </ul>

          <div class="d-flex gap-3 me-4">
            <a href="tel: +918889991736" class="text-dark text-decoration-none">
              +91 8889991736
            </a>
            <button class="btn btn-primary">Student Login</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="card shadow-lg p-4 rounded-4">
        <h2 class="text-center mb-2">Enquiry Form</h2>
        <p class="text-center text-muted mb-4">
          RICR is a subsidiary of Raj Digital Private Limited. It is a premier
          coding and robotics institute, empowering students with cutting-edge
          education.
        </p>

        <form class="bg-info">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Parson Name*</label>
                    <input type="text" class="form-control" placeholder="Parson Name">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contact Number*</label>
                    <input type="text" class="form-control" placeholder="Contact Number">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email*</label>
                    <input type="text" class="form-control" placeholder="Email">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Qualification*</label>
                    <input type="text" class="form-control" placeholder="Qualification">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Collage/School Name*</label>
                    <input type="text" class="form-control" placeholder="Collage/School Name">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Year*</label>
                    <select class="form-select">
                        <option>Year</option>
                        <option>First year</option>
                         <option>Second year</option>
                          <option>third year</option>
                           <option>Final year</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Branch*</label>
                    <input type="text" class="form-control" placeholder="Branch">
                </div>
            </div>

            <div class="row mt-4">

  <!-- LEFT SIDE (COURSE) -->
                <div class="col-md-6">
                    <label class="form-label">Interested in Which Course*</label>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Full Stack</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Data Science</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Data Analytics</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Business</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Java</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Python</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">C/C++</label>
                    </div>

                    <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Other</label>
                    </div>
                </div>

  <!-- RIGHT SIDE -->
                <div class="col-md-6">
                    <label class="form-label">Source of Information</label>
                    <select class="form-select mb-3">
                    <option>Select</option>
                    </select>

                    <label class="form-label">Name of Executive*</label>
                    <select class="form-select">
                    <option>Select</option>
                    </select>
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-dark px-5 py-2 rounded-pill"> Submit</button>
            </div>
        </form>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
